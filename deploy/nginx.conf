upstream pdp_backend {
    server web:8000;
    keepalive 16;
}

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 35m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy same-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    location /api/ {
        proxy_pass http://pdp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
    }

    location /admin/ {
        proxy_pass http://pdp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /static/ {
        alias /srv/static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location /media/ {
        alias /srv/media/;
        expires 1h;
        add_header Cache-Control "private, max-age=3600";
    }

    location = /healthz {
        proxy_pass http://pdp_backend/api/health/ready/;
        proxy_set_header Host $host;
        access_log off;
    }

    # The SPA entrypoint must always be revalidated.  JavaScript assets are
    # content-hashed by Vite, but an HTML document cached by the browser can
    # otherwise keep pointing at an older bundle after a production release.
    location = /index.html {
        expires -1;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }
}
