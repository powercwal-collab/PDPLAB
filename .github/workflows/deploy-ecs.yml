name: Deploy ECS

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: [self-hosted, linux, x64, pdp-lab-production]
    environment: production
    timeout-minutes: 35
    env:
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      PDP_ENV_FILE: /srv/pdp-lab/shared/.env.production
    steps:
      - name: Checkout verified main commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
          fetch-depth: 1

      - name: Verify production prerequisites
        run: |
          set -euo pipefail
          test -s "$PDP_ENV_FILE"
          test -d /srv/pdp-lab/releases
          test -w /srv/pdp-lab/releases
          docker version >/dev/null
          docker compose version >/dev/null
          grep -q '^PDP_ENV=production$' "$PDP_ENV_FILE"
          grep -q '^DJANGO_SECRET_KEY=.' "$PDP_ENV_FILE"
          grep -q '^DATABASE_URL=postgresql://' "$PDP_ENV_FILE"

      - name: Stage commit release
        run: |
          set -euo pipefail
          RELEASE="/srv/pdp-lab/releases/${DEPLOY_SHA}"
          mkdir -p "$RELEASE"
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude '.env.production' \
            --exclude '.venv' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude 'backend/media' \
            ./ "$RELEASE/"
          printf '%s\n' \
            "sha=${DEPLOY_SHA}" \
            "run_id=${GITHUB_RUN_ID}" \
            "deployed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > "$RELEASE/.release"

      - name: Deploy and verify
        run: |
          set -euo pipefail
          RELEASE="/srv/pdp-lab/releases/${DEPLOY_SHA}"
          PREVIOUS="$(readlink -f /srv/pdp-lab/current 2>/dev/null || true)"

          if ! PDP_ENV_FILE="$PDP_ENV_FILE" "$RELEASE/deploy/deploy.sh"; then
            if [[ -n "$PREVIOUS" && -x "$PREVIOUS/deploy/deploy.sh" ]]; then
              echo "部署失败，尝试恢复：$PREVIOUS" >&2
              PDP_ENV_FILE="$PDP_ENV_FILE" "$PREVIOUS/deploy/deploy.sh" || true
            fi
            exit 1
          fi

          ln -sfn "$RELEASE" /srv/pdp-lab/current

      - name: Retain five releases
        if: success()
        run: |
          set -euo pipefail
          cd /srv/pdp-lab/releases
          ls -1dt */ | tail -n +6 | xargs -r rm -rf

      - name: Publish deployment summary
        if: always()
        run: |
          {
            echo "### PDP Lab production"
            echo "- Commit: \`${DEPLOY_SHA}\`"
            echo "- Runner: \`${RUNNER_NAME}\`"
            echo "- Result: \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
