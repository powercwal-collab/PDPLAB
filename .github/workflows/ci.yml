name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      DJANGO_SECRET_KEY: ci-only-secret-key-not-for-production
      PDP_ENV: development
      PDP_ALLOW_MOCK_DIAGNOSIS: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Verify migrations and tests
        run: |
          python backend/manage.py makemigrations --check --dry-run
          python backend/manage.py check
          python backend/manage.py test diagnosis

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Build frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Package verified production source
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          tar \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='.env.production' \
            --exclude='.venv' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='backend/media' \
            -czf "$RUNNER_TEMP/pdp-lab-${GITHUB_SHA}.tar.gz" .

      - name: Upload verified production source
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: production-source-${{ github.sha }}
          path: ${{ runner.temp }}/pdp-lab-${{ github.sha }}.tar.gz
          if-no-files-found: error
          retention-days: 3
